services:
  app:
    image: physical-therapy-erp
    build:
      context: .
      target: runtime
    container_name: erp_app
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "Physical therapy clinic ERP"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      LOG_CHANNEL: stderr
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: erp
      DB_USERNAME: root
      DB_PASSWORD: root
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      CODIGO_ACCESO_SISTEMA: code123
      CODIGO_ADMINISTRADOR: admin
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "artisan", "about", "--no-ansi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  db:
    image: mysql:8
    container_name: erp_db
    environment:
      MYSQL_DATABASE: erp
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 120s

volumes:
  mysql_data:
